<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reel Maker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0d0d18;color:#fff;font-family:'DM Sans','Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    input,textarea,button,select{font-family:inherit}
    input[type="range"]{accent-color:#ff3c7e;cursor:pointer}
    textarea{resize:vertical}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#0d0d18}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:999px}
    .rhandle{position:absolute;width:10px;height:10px;background:#ff3c7e;border:2px solid #fff;border-radius:2px;z-index:30}
    .rse{bottom:-5px;right:-5px;cursor:se-resize}
    .rsw{bottom:-5px;left:-5px;cursor:sw-resize}
    .rne{top:-5px;right:-5px;cursor:ne-resize}
    .rnw{top:-5px;left:-5px;cursor:nw-resize}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback} = React;

/* ─── constants ─── */
const NICHES=["Lifestyle","Fitness","Food","Travel","Fashion","Beauty","Business","Tech"];
const TEXT_STYLES=[
  {id:"bold",  label:"BOLD",  sub:"BOLD",    fw:900,color:"#fff"},
  {id:"stroke",label:"STROKE",sub:"OUTLINED",fw:700,color:"#ff3c7e"},
  {id:"pill",  label:"PILL",  sub:"PILL",    fw:700,color:"#fff",pill:true},
  {id:"shadow",label:"SHADOW",sub:"SHADOW",  fw:900,color:"#ff3c7e",shadow:true},
  {id:"grad",  label:"GRAD",  sub:"GRADIENT",fw:900,grad:true},
  {id:"clean", label:"clean", sub:"CLEAN",   fw:400,color:"#fff"},
];
const ACCENT_MAP={Pink:"#ff3c7e",Purple:"#a855f7",Cyan:"#06b6d4",Gold:"#f59e0b",Green:"#22c55e",White:"#ffffff"};
const OVERLAY_LIST=[
  {id:"vignette",label:"Vignette",icon:"🌑"},
  {id:"bars",label:"Cinematic Black Bars",icon:"🎬"},
  {id:"grain",label:"Film Grain",icon:"📽️"},
  {id:"blur",label:"Edge Blur",icon:"🔆"},
];
const EMOJIS=["⬛","🔥","✨","💯","🙌","💪","🎉","☀️","👏","↩️","😎","🤩","🌸","🦋","🎵","🧚","🏆","👑","💎","🌈","▶️","🧿","🌊","🎯","🌴","🎮","💡"];

/* ─── tiny shared styles ─── */
const card={background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"20px 22px",marginBottom:14};
const pBtn=(on,col)=>({padding:"5px 14px",borderRadius:999,fontSize:12,fontWeight:500,cursor:"pointer",border:`1px solid ${on?col:"rgba(255,255,255,0.12)"}`,background:on?col+"22":"transparent",color:on?col:"rgba(255,255,255,0.6)",transition:"all .15s"});

function Label({children,mt}){return <div style={{fontSize:10,letterSpacing:"0.12em",color:"rgba(255,255,255,0.4)",textTransform:"uppercase",marginBottom:8,marginTop:mt||0}}>{children}</div>}
function SecHead({num,title}){return(
  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
    <div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#ff3c7e,#a855f7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#fff",flexShrink:0}}>{num}</div>
    <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.15em",color:"rgba(255,255,255,0.55)",textTransform:"uppercase"}}>{title}</span>
  </div>
)}
function Toggle({on,onToggle}){return(
  <div onClick={onToggle} style={{width:42,height:24,borderRadius:999,cursor:"pointer",background:on?"linear-gradient(90deg,#ff3c7e,#a855f7)":"rgba(255,255,255,0.1)",position:"relative",transition:"background .2s",flexShrink:0}}>
    <div style={{position:"absolute",top:3,left:on?21:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}/>
  </div>
)}
function DashedUpload({icon,label,sub,onClick}){
  const [hov,setHov]=useState(false);
  return(
    <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{flex:1,border:`1.5px dashed ${hov?"#ff3c7e":"rgba(255,255,255,0.15)"}`,borderRadius:10,padding:"24px 12px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer",background:hov?"rgba(255,60,126,0.05)":"transparent",transition:"all .2s"}}>
      <span style={{fontSize:26}}>{icon}</span>
      <span style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.8)"}}>{label}</span>
      <span style={{fontSize:10,color:"rgba(255,255,255,0.35)",letterSpacing:"0.08em"}}>{sub}</span>
    </div>
  );
}

/* ─── Draggable + Resizable canvas element ─── */
function CanvasEl({el,selected,onSelect,onChange,onDelete,bounds}){
  const ref=useRef(null);
  const drag=useRef(null);
  const resize=useRef(null);

  // pointer events so we capture outside canvas too
  useEffect(()=>{
    const onMove=(e)=>{
      const cx=e.clientX??e.touches?.[0]?.clientX;
      const cy=e.clientY??e.touches?.[0]?.clientY;
      if(drag.current){
        const dx=cx-drag.current.sx;
        const dy=cy-drag.current.sy;
        const nx=Math.max(0,Math.min(bounds.w-el.w, drag.current.ox+dx));
        const ny=Math.max(0,Math.min(bounds.h-el.h, drag.current.oy+dy));
        onChange({...el,x:nx,y:ny});
      }
      if(resize.current){
        const dx=cx-resize.current.sx;
        const dy=cy-resize.current.sy;
        const dir=resize.current.dir;
        let {ox,oy,ow,oh}=resize.current;
        let nw=ow,nh=oh,nx=ox,ny=oy;
        if(dir.includes("e")) nw=Math.max(40,ow+dx);
        if(dir.includes("s")) nh=Math.max(40,oh+dy);
        if(dir.includes("w")){nw=Math.max(40,ow-dx);nx=ox+ow-nw;}
        if(dir.includes("n")){nh=Math.max(40,oh-dy);ny=oy+oh-nh;}
        onChange({...el,x:nx,y:ny,w:nw,h:nh});
      }
    };
    const onUp=()=>{drag.current=null;resize.current=null;};
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    window.addEventListener("touchmove",onMove,{passive:false});
    window.addEventListener("touchend",onUp);
    return()=>{
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseup",onUp);
      window.removeEventListener("touchmove",onMove);
      window.removeEventListener("touchend",onUp);
    };
  },[el,bounds,onChange]);

  const startDrag=(e)=>{
    e.stopPropagation();
    onSelect();
    const cx=e.clientX??e.touches?.[0]?.clientX;
    const cy=e.clientY??e.touches?.[0]?.clientY;
    drag.current={sx:cx,sy:cy,ox:el.x,oy:el.y};
  };
  const startResize=(e,dir)=>{
    e.stopPropagation();
    e.preventDefault();
    const cx=e.clientX??e.touches?.[0]?.clientX;
    const cy=e.clientY??e.touches?.[0]?.clientY;
    resize.current={sx:cx,sy:cy,ox:el.x,oy:el.y,ow:el.w,oh:el.h,dir};
  };

  const content=()=>{
    if(el.kind==="pip")  return <img src={el.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:4,pointerEvents:"none"}}/>;
    if(el.kind==="emoji") return <span style={{fontSize:el.h*0.7,lineHeight:1,userSelect:"none"}}>{el.label}</span>;
    if(el.kind==="shape"){
      const isCirc=el.label==="Circle";
      return <div style={{width:"100%",height:"100%",background:"rgba(255,60,126,0.35)",border:"2px solid #ff3c7e",borderRadius:isCirc?"50%":6}}/>;
    }
    if(el.kind==="caption") return(
      <div style={{fontSize:el.h*0.4,fontWeight:700,color:el.color||"#ff3c7e",textShadow:"1px 1px 4px rgba(0,0,0,0.8)",whiteSpace:"nowrap",userSelect:"none",lineHeight:1}}>
        {el.label}
      </div>
    );
    return null;
  };

  return(
    <div ref={ref}
      onMouseDown={startDrag}
      onTouchStart={startDrag}
      style={{position:"absolute",left:el.x,top:el.y,width:el.w,height:el.h,cursor:"move",
        outline:selected?"2px solid #ff3c7e":"none",
        outlineOffset:1,zIndex:selected?15:10,
        display:"flex",alignItems:"center",justifyContent:"center",
      }}>
      {content()}
      {selected&&<>
        <div className="rhandle rse" onMouseDown={e=>startResize(e,"se")} onTouchStart={e=>startResize(e,"se")}/>
        <div className="rhandle rsw" onMouseDown={e=>startResize(e,"sw")} onTouchStart={e=>startResize(e,"sw")}/>
        <div className="rhandle rne" onMouseDown={e=>startResize(e,"ne")} onTouchStart={e=>startResize(e,"ne")}/>
        <div className="rhandle rnw" onMouseDown={e=>startResize(e,"nw")} onTouchStart={e=>startResize(e,"nw")}/>
        <button onMouseDown={e=>e.stopPropagation()} onClick={onDelete}
          style={{position:"absolute",top:-10,right:-10,width:20,height:20,borderRadius:"50%",background:"#ef4444",border:"2px solid #fff",color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:31}}>×</button>
      </>}
    </div>
  );
}

/* ═══════════════ MAIN APP ═══════════════ */
function App(){
  /* clips */
  const [clips,setClips]=useState([]);
  /* form */
  const [brief,setBrief]=useState("");
  const [niche,setNiche]=useState("Lifestyle");
  const [caption,setCaption]=useState("");
  const [handle,setHandle]=useState("");
  /* text style */
  const [textStyle,setTextStyle]=useState("bold");
  const [fontSize,setFontSize]=useState(46);
  const [accentColor,setAccentColor]=useState("Pink");
  /* overlays */
  const [activeOverlays,setActiveOverlays]=useState({});
  /* emoji */
  const [emojiInput,setEmojiInput]=useState("");
  const [emojiSize,setEmojiSize]=useState(64);
  /* canvas elements (pip, emoji, shapes, captions) */
  const [canvasEls,setCanvasEls]=useState([]);
  const [selectedEl,setSelectedEl]=useState(null);
  /* playback */
  const [playing,setPlaying]=useState(false);
  const [volume,setVolume]=useState(1);
  const [muted,setMuted]=useState(false);
  /* ai */
  const [generatedCaption,setGeneratedCaption]=useState("");
  const [generating,setGenerating]=useState(false);
  const [apiKey,setApiKey]=useState("");
  const [showApiKey,setShowApiKey]=useState(false);
  /* export */
  const [exportFormat,setExportFormat]=useState("MP4");
  const [exportQuality,setExportQuality]=useState("1080p");
  const [exportRatio,setExportRatio]=useState("9:16");
  const [exportFps,setExportFps]=useState("30fps");
  const [exporting,setExporting]=useState(false);
  const [exportProgress,setExportProgress]=useState(0);
  const [exportDone,setExportDone]=useState(false);

  const videoInputRef=useRef(null);
  const imageInputRef=useRef(null);
  const pipInputRef=useRef(null);
  const previewVideoRef=useRef(null);
  const canvasRef=useRef(null);

  /* canvas bounds (200×360 phone) */
  const CANVAS={w:200,h:360};

  const addClips=(files,type)=>{
    const nc=files.map(f=>({id:Date.now()+Math.random(),name:f.name,url:URL.createObjectURL(f),duration:type==="VID"?"8.0s":"5.0s",type}));
    setClips(p=>[...p,...nc]);
  };
  const removeClip=id=>setClips(p=>p.filter(c=>c.id!==id));

  /* apply volume to video */
  useEffect(()=>{
    if(previewVideoRef.current){
      previewVideoRef.current.volume=volume;
      previewVideoRef.current.muted=muted;
    }
  },[volume,muted]);

  const handlePlay=()=>{if(previewVideoRef.current){previewVideoRef.current.play();setPlaying(true);}};
  const handleStop=()=>{if(previewVideoRef.current){previewVideoRef.current.pause();previewVideoRef.current.currentTime=0;setPlaying(false);}};

  const addPip=(file)=>{
    const url=URL.createObjectURL(file);
    const id=Date.now()+Math.random();
    setCanvasEls(p=>[...p,{id,kind:"pip",label:file.name,url,x:20,y:20,w:80,h:80,visible:true}]);
  };
  const addEmoji=(em)=>{
    const id=Date.now()+Math.random();
    setCanvasEls(p=>[...p,{id,kind:"emoji",label:em,x:60,y:140,w:emojiSize,h:emojiSize,visible:true}]);
    setSelectedEl(id);
  };
  const addShape=(sh)=>{
    const id=Date.now()+Math.random();
    setCanvasEls(p=>[...p,{id,kind:"shape",label:sh,x:40,y:120,w:100,h:60,visible:true}]);
    setSelectedEl(id);
  };
  const updateEl=(el)=>setCanvasEls(p=>p.map(e=>e.id===el.id?el:e));
  const deleteEl=(id)=>{setCanvasEls(p=>p.filter(e=>e.id!==id));setSelectedEl(null);};
  const toggleLayerVis=(id)=>setCanvasEls(p=>p.map(e=>e.id===id?{...e,visible:!e.visible}:e));
  const toggleOverlay=id=>setActiveOverlays(p=>({...p,[id]:!p[id]}));

  /* add caption as draggable element */
  const addCaptionEl=()=>{
    if(!caption) return;
    const id=Date.now()+Math.random();
    setCanvasEls(p=>[...p,{id,kind:"caption",label:caption,color:ACCENT_MAP[accentColor]||"#ff3c7e",x:10,y:280,w:180,h:40,visible:true}]);
    setSelectedEl(id);
  };

  const generateCaptions=async()=>{
    if(!apiKey){setShowApiKey(true);return;}
    setGenerating(true);setGeneratedCaption("");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:`Generate 3 short punchy social media reel captions for a ${niche} reel about "${brief||"general content"}". Each 1-2 lines, engaging, with emojis. Numbered list.`}]})
      });
      const data=await res.json();
      setGeneratedCaption(data.content?.find(b=>b.type==="text")?.text||"No captions returned.");
    }catch(err){setGeneratedCaption("Error: "+err.message);}
    setGenerating(false);
  };

  const startExport=()=>{
    setExporting(true);setExportDone(false);setExportProgress(0);
    let p=0;
    const iv=setInterval(()=>{
      p+=Math.random()*12+4;
      if(p>=100){clearInterval(iv);setExportProgress(100);setTimeout(()=>{setExporting(false);setExportDone(true);},400);}
      else setExportProgress(Math.round(p));
    },220);
  };

  const previewVideo=clips.find(c=>c.type==="VID")||null;
  const previewImg=clips.find(c=>c.type==="IMG")||null;
  const activeTS=TEXT_STYLES.find(t=>t.id===textStyle);

  /* all layers = canvas elements + base clips */
  const allLayers=[
    ...clips.map(c=>({id:c.id,label:c.name,kind:c.type==="VID"?"video":"image",visible:true,isClip:true})),
    ...canvasEls,
  ];

  return(
    <div style={{minHeight:"100vh",background:"#0d0d18",color:"#fff"}}>

      {/* Header */}
      <div style={{textAlign:"center",padding:"36px 20px 24px"}}>
        <h1 style={{fontSize:"clamp(36px,7vw,64px)",fontWeight:900,margin:0,letterSpacing:"-0.02em",lineHeight:1}}>
          <span style={{color:"#ff3c7e"}}>REEL </span><span style={{color:"#fff"}}>MAKER</span>
        </h1>
        <p style={{fontSize:11,letterSpacing:"0.2em",color:"rgba(255,255,255,0.35)",marginTop:10,textTransform:"uppercase"}}>SEQUENCE · STYLE · OVERLAY · DOWNLOAD</p>
      </div>

      {/* API Key */}
      {showApiKey&&(
        <div style={{maxWidth:1200,margin:"0 auto 16px",padding:"0 20px"}}>
          <div style={{background:"rgba(255,60,126,0.08)",border:"1px solid rgba(255,60,126,0.25)",borderRadius:10,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.7)",flex:1}}>🔑 Anthropic API key for AI captions:</span>
            <input value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." type="password"
              style={{flex:"0 0 280px",background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,60,126,0.3)",borderRadius:7,color:"#fff",fontSize:13,padding:"8px 12px",outline:"none"}}/>
            <button onClick={()=>setShowApiKey(false)} style={{padding:"8px 16px",borderRadius:7,background:"#ff3c7e",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Save</button>
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:16,padding:"0 20px 60px",maxWidth:1200,margin:"0 auto",alignItems:"flex-start"}}>

        {/* ════════ LEFT ════════ */}
        <div style={{flex:"0 0 540px",minWidth:0}}>

          {/* 1. Media */}
          <div style={card}>
            <SecHead num="1" title="Media Sequence"/>
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              <DashedUpload icon="🎬" label="Add Video(s)" sub="MP4 · MOV · WebM" onClick={()=>videoInputRef.current?.click()}/>
              <DashedUpload icon="🖼️" label="Add Image(s)" sub="JPG · PNG · WebP"  onClick={()=>imageInputRef.current?.click()}/>
              <input ref={videoInputRef} type="file" accept="video/*" multiple style={{display:"none"}} onChange={e=>addClips(Array.from(e.target.files),"VID")}/>
              <input ref={imageInputRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>addClips(Array.from(e.target.files),"IMG")}/>
            </div>
            {clips.length>0&&<>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:10,letterSpacing:"0.12em",color:"rgba(255,255,255,0.35)",textTransform:"uppercase"}}>Playback Order</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>click × to remove</span>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {clips.map(clip=>(
                  <div key={clip.id} style={{position:"relative",width:72}}>
                    <div style={{width:72,height:72,borderRadius:8,overflow:"hidden",background:"#1a1a2e",border:"1px solid rgba(255,255,255,0.1)"}}>
                      {clip.type==="IMG"
                        ?<img src={clip.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                        :<video src={clip.url} muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>}
                    </div>
                    <div style={{position:"absolute",top:3,left:3,background:"rgba(0,0,0,0.7)",borderRadius:3,padding:"1px 4px",fontSize:9,fontWeight:700,color:clip.type==="VID"?"#60a5fa":"#a78bfa"}}>{clip.type}</div>
                    <button onClick={()=>removeClip(clip.id)} style={{position:"absolute",top:2,right:2,width:16,height:16,borderRadius:"50%",background:"#ef4444",border:"none",color:"#fff",fontSize:9,cursor:"pointer"}}>×</button>
                    <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.5)",marginTop:3}}>{clip.duration}</div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:10,fontSize:11,color:"rgba(255,255,255,0.35)"}}>{clips.length} clip{clips.length!==1?"s":""} · {clips.length*8}s total</div>
            </>}
          </div>

          {/* PiP */}
          <div style={card}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#ff3c7e,#a855f7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#fff"}}>↗</div>
              <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.15em",color:"rgba(255,255,255,0.55)",textTransform:"uppercase"}}>Picture-in-Picture</span>
            </div>
            <DashedUpload icon="🖼️+" label="Add overlay image" sub="Drops into preview — drag & resize freely" onClick={()=>pipInputRef.current?.click()}/>
            <input ref={pipInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{if(e.target.files[0]) addPip(e.target.files[0]);}}/>
            {canvasEls.filter(e=>e.kind==="pip").length>0&&(
              <div style={{marginTop:10,fontSize:11,color:"rgba(255,255,255,0.4)"}}>
                {canvasEls.filter(e=>e.kind==="pip").length} overlay image{canvasEls.filter(e=>e.kind==="pip").length>1?"s":""} · click in preview to select &amp; resize
              </div>
            )}
          </div>

          {/* 2. Caption Brief */}
          <div style={card}>
            <SecHead num="2" title="Caption Brief"/>
            <Label>What's your reel about?</Label>
            <textarea value={brief} onChange={e=>setBrief(e.target.value)} placeholder="e.g. food, fitness tips, travel vlog..."
              style={{width:"100%",minHeight:60,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:14,padding:"10px 12px",outline:"none"}}/>
            <Label mt={14}>Niche</Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {["Lifestyle","Fitness","Food","Travel","Fashion","Beauty","Business","Tech"].map(n=><button key={n} onClick={()=>setNiche(n)} style={pBtn(niche===n,"#ff3c7e")}>{n}</button>)}
            </div>
            <Label mt={14}>Caption Text</Label>
            <div style={{display:"flex",gap:8}}>
              <input value={caption} onChange={e=>setCaption(e.target.value)} placeholder="Your caption here..."
                style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:14,padding:"10px 12px",outline:"none"}}/>

            </div>
            <div style={{display:"flex",gap:16,marginBottom:16}}>

                <Label>Aspect Ratio</Label>

                    {fps}{hint&&<span style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginLeft:4}}>· {hint}</span>}
                  </button>
                ))}
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 14px",marginBottom:16,display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{exportRatio} · {exportQuality} · {exportFps} · {exportFormat}</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.25)"}}>~{exportQuality==="4K"?"800":exportQuality==="1080p"?"250":"80"}MB est.</span>
            </div>
            {exporting&&(
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>Rendering reel…</span>
                  <span style={{fontSize:11,color:"#ff3c7e",fontWeight:700}}>{exportProgress}%</span>
                </div>
                <div style={{height:6,background:"rgba(255,255,255,0.08)",borderRadius:999,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${exportProgress}%`,background:"linear-gradient(90deg,#ff3c7e,#a855f7)",borderRadius:999,transition:"width .3s ease"}}/>
                </div>
              </div>
            )}
            {exportDone&&(
              <div style={{marginBottom:14,background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.25)",borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>✅</span>
                <span style={{fontSize:13,color:"#22c55e",fontWeight:600}}>Reel exported! Share below ↓</span>
              </div>
            )}
            <button onClick={startExport} disabled={exporting} style={{width:"100%",padding:15,borderRadius:12,border:"none",background:exporting?"rgba(255,255,255,0.06)":"linear-gradient(90deg,#ff3c7e,#a855f7)",color:exporting?"rgba(255,255,255,0.4)":"#fff",fontSize:15,fontWeight:800,letterSpacing:"0.12em",cursor:exporting?"not-allowed":"pointer",textTransform:"uppercase",boxShadow:exporting?"none":"0 4px 24px rgba(255,60,126,0.35)",transition:"all .2s"}}>

            {exportDone&&(
              <div style={{marginTop:10}}>

                <div style={{display:"flex",gap:8}}>
                  {[{label:"Instagram",color:"#e1306c",icon:"📸",url:"https://www.instagram.com/reels/"},{label:"TikTok",color:"#69c9d0",icon:"🎵",url:"https://www.tiktok.com/upload"},{label:"YouTube",color:"#ff0000",icon:"▶️",url:"https://studio.youtube.com/"}].map(s=>(
                    <a key={s.label} href={s.url} target="_blank" rel="noopener noreferrer"
                      style={{flex:1,padding:"9px 4px",borderRadius:8,fontSize:11,fontWeight:600,border:`1px solid ${s.color}55`,background:`${s.color}15`,color:s.color,textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:4,transition:"all .15s"}}
                      onMouseEnter={e=>{e.currentTarget.style.background=`${s.color}30`;e.currentTarget.style.transform="translateY(-1px)";}}
                      onMouseLeave={e=>{e.currentTarget.style.background=`${s.color}15`;e.currentTarget.style.transform="";}}
                    >{s.icon} {s.label}</a>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* ════════ RIGHT ════════ */}
        <div style={{flex:1,minWidth:0,position:"sticky",top:20}}>

          {/* Layers Panel */}

                  const isSelected=selectedEl===layer.id;

                    <div key={layer.id}
                      onClick={()=>isCanvas&&setSelectedEl(isSelected?null:layer.id)}
                      style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:7,background:isSelected?"rgba(255,60,126,0.1)":"rgba(255,255,255,0.04)",fontSize:12,color:"rgba(255,255,255,0.7)",cursor:isCanvas?"pointer":"default",border:isSelected?"1px solid rgba(255,60,126,0.3)":"1px solid transparent",transition:"all .15s"}}>

                      <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{layer.label}</span>
                      {isCanvas&&(
                        <button onClick={e=>{e.stopPropagation();toggleLayerVis(layer.id);}}
                          style={{background:"none",border:"none",cursor:"pointer",fontSize:12,opacity:layer.visible?1:0.3,padding:"0 2px"}} title={layer.visible?"Hide":"Show"}>
                          {layer.visible?"👁":"🚫"}
                        </button>
                      )}
                      {isCanvas&&(
                        <button onClick={e=>{e.stopPropagation();deleteEl(layer.id);}}
                          style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#ef4444",padding:"0 2px"}}>×</button>
                      )}
                      <span style={{fontSize:10,color:layer.visible?"#22c55e":"rgba(255,255,255,0.2)"}}>●</span>
                    </div>
                  );
                })}
              </div>
            }
          </div>

          {/* Live Preview */}
          <div style={card}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.15em",color:"rgba(255,255,255,0.45)",textTransform:"uppercase",marginBottom:6}}>Live Preview</div>
            <p style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginBottom:14}}>Click elements to select · drag to move · corner handles to resize</p>

            {/* Phone */}
            <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
              <div
                ref={canvasRef}
                onClick={e=>{if(e.target===canvasRef.current||e.target===canvasRef.current.firstChild) setSelectedEl(null);}}
                style={{width:CANVAS.w,height:CANVAS.h,borderRadius:28,background:"#111",border:"3px solid #333",position:"relative",overflow:"hidden",boxShadow:"0 20px 60px rgba(0,0,0,0.7)",userSelect:"none"}}>

                {/* Notch */}
                <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:60,height:16,background:"#111",borderRadius:"0 0 12px 12px",zIndex:50}}/>

                {/* Video BG */}
                {previewVideo&&(
                  <video ref={previewVideoRef} src={previewVideo.url} loop playsInline
                    style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",zIndex:1}}
                    onEnded={()=>setPlaying(false)}/>
                )}
                {/* Image BG */}
                {!previewVideo&&previewImg&&(
                  <img src={previewImg.url} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",zIndex:1}}/>
                )}
                {/* Empty */}
                {!previewVideo&&!previewImg&&(
                  <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,#1a1a2e,#0d0d18)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1}}>
                    <span style={{fontSize:32,opacity:0.2}}>▶</span>
                  </div>
                )}

                {/* Visual overlays */}
                {activeOverlays.vignette&&<div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.75) 100%)",pointerEvents:"none",zIndex:5}}/>}
                {activeOverlays.bars&&<>
                  <div style={{position:"absolute",top:0,left:0,right:0,height:30,background:"#000",pointerEvents:"none",zIndex:5}}/>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,height:30,background:"#000",pointerEvents:"none",zIndex:5}}/>
                </>}

                {/* Canvas elements (pip, emoji, shapes, captions) */}
                {canvasEls.filter(e=>e.visible).map(el=>(
                  <CanvasEl key={el.id} el={el} selected={selectedEl===el.id}

                    onChange={updateEl}
                    onDelete={()=>deleteEl(el.id)}
                    bounds={CANVAS}/>

                {/* Static caption at bottom if not added as canvas el */}
                {caption&&canvasEls.filter(e=>e.kind==="caption").length===0&&(
                  <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"10px 10px 16px",zIndex:8}}>
                    <div style={{marginBottom:3,fontSize:Math.min(fontSize*0.28,15),fontWeight:activeTS?.fw||700,color:ACCENT_MAP[accentColor]||"#ff3c7e",textShadow:"1px 1px 4px rgba(0,0,0,0.8)"}}>
                      {caption}
                    </div>
                    {handle&&<div style={{fontSize:9,color:"rgba(255,255,255,0.7)",textShadow:"0 1px 3px rgba(0,0,0,0.8)"}}>{handle}</div>}
                  </div>
                )}

                {/* Play overlay */}
                {previewVideo&&!playing&&(
                  <div onClick={handlePlay} style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:20,cursor:"pointer"}}>

                      <span style={{fontSize:20,marginLeft:4}}>▶</span>

            </div>

            <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:12}}>

                  style={{background:"none",border:"none",cursor:"pointer",fontSize:18,padding:0,flexShrink:0}}
                  title={muted?"Unmute":"Mute"}>
                  {muted||volume===0?"🔇":volume<0.5?"🔉":"🔊"}
                </button>
                <input type="range" min={0} max={1} step={0.01} value={muted?0:volume}
                  onChange={e=>{setVolume(+e.target.value);if(+e.target.value>0) setMuted(false);}}
                  style={{flex:1,accentColor:"#ff3c7e"}}/>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",minWidth:34,textAlign:"right"}}>{muted?"0":Math.round(volume*100)}%</span>
              </div>
            </div>

            {previewVideo&&(
              <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:8}}>{previewVideo.name}</div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
