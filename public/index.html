<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reel Maker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d18;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
input,textarea,button,select{font-family:inherit}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:999px;outline:none;cursor:pointer;background:rgba(255,255,255,0.15)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#ff3c7e;cursor:pointer;border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,0.5)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0d0d18}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:99px}

/* Canvas element system */
#phone-canvas{position:relative;overflow:hidden}
.cel{position:absolute;cursor:move;user-select:none;touch-action:none;box-sizing:border-box}
.cel.sel{outline:2px solid #ff3c7e;outline-offset:1px;z-index:20!important}
.rh{position:absolute;width:12px;height:12px;background:#ff3c7e;border:2px solid #fff;border-radius:2px;z-index:30;touch-action:none;cursor:pointer}
.rh.se{bottom:-7px;right:-7px;cursor:se-resize}
.rh.sw{bottom:-7px;left:-7px;cursor:sw-resize}
.rh.ne{top:-7px;right:-7px;cursor:ne-resize}
.rh.nw{top:-7px;left:-7px;cursor:nw-resize}
.del-btn{position:absolute;top:-11px;right:-11px;width:22px;height:22px;border-radius:50%;background:#ef4444;border:2px solid #fff;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:31;padding:0;line-height:1}

/* Layout */
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px 22px;margin-bottom:14px}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-badge{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#ff3c7e,#a855f7);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.15em;color:rgba(255,255,255,0.55);text-transform:uppercase}
.field-label{font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px}
.pill-btn{padding:5px 14px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.6)}
.pill-btn.active{background:rgba(255,60,126,0.15);border-color:#ff3c7e;color:#ff3c7e}
.seg-btn{flex:1;padding:9px 0;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.55)}
.toggle{width:42px;height:24px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,0.1);position:relative;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:linear-gradient(90deg,#ff3c7e,#a855f7)}
.toggle-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,0.4)}
.toggle.on .toggle-knob{left:21px}
.upload-box{flex:1;border:1.5px dashed rgba(255,255,255,0.15);border-radius:10px;padding:22px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .2s;text-align:center}
.upload-box:hover{border-color:#ff3c7e;background:rgba(255,60,126,0.05)}
.upload-box .ub-icon{font-size:26px}
.upload-box .ub-label{font-size:13px;font-weight:600;color:rgba(255,255,255,0.8)}
.upload-box .ub-sub{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:.08em}
.text-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:14px;padding:10px 12px;outline:none}
.text-input:focus{border-color:#ff3c7e}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.slider-val{font-size:11px;font-weight:700;color:#ff3c7e;min-width:40px;text-align:right;white-space:nowrap}
.layer-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:rgba(255,255,255,0.04);border:1px solid transparent;font-size:12px;color:rgba(255,255,255,0.7);cursor:pointer;transition:all .15s;margin-bottom:4px}
.layer-row:hover{background:rgba(255,255,255,0.07)}
.layer-row.sel{background:rgba(255,60,126,0.1);border-color:rgba(255,60,126,0.3)}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─────────────────────────────────────────────
// STATE  (never mutated directly — use set())
// ─────────────────────────────────────────────
let S = {
  clips: [],
  canvasEls: [],
  selectedEl: null,
  caption: '', handle: '', brief: '', niche: 'Lifestyle',
  textStyle: 'bold', fontSize: 46, accentColor: 'Pink',
  overlays: {vignette:false, bars:false, grain:false, blur:false},
  overlayOpacity: {vignette:0.7, bars:1, grain:0.5, blur:0.5},
  shapeOpacity: {},   // id -> opacity
  playing: false, volume: 1, muted: false,
  audioName: null, audioUrl: null,
  emojiInput: '', emojiSize: 64,
  exportFormat:'MP4', exportQuality:'1080p', exportRatio:'9:16', exportFps:'30fps',
  exporting:false, exportProgress:0, exportDone:false,
  apiKey:'', showApiKey:false, generatedCaption:'', generating:false,
};

// Persistent media objects — survive re-renders
let _audioEl = null;
let _videoSrc = null; // track if video src changed

const ACCENT = {Pink:'#ff3c7e',Purple:'#a855f7',Cyan:'#06b6d4',Gold:'#f59e0b',Green:'#22c55e',White:'#ffffff'};
const NICHES = ['Lifestyle','Fitness','Food','Travel','Fashion','Beauty','Business','Tech'];
const EMOJIS = ['⬛','🔥','✨','💯','🙌','💪','🎉','☀️','👏','↩️','😎','🤩','🌸','🦋','🎵','🧚','🏆','👑','💎','🌈','▶️','🧿','🌊','🎯','🌴','🎮','💡'];
const TEXT_STYLES = [
  {id:'bold',  label:'BOLD',  fw:900,color:'#fff'},
  {id:'stroke',label:'STROKE',fw:700,color:'#ff3c7e'},
  {id:'pill',  label:'PILL',  fw:700,color:'#fff',pill:true},
  {id:'shadow',label:'SHADOW',fw:900,color:'#ff3c7e',shadow:true},
  {id:'grad',  label:'GRAD',  fw:900,grad:true},
  {id:'clean', label:'clean', fw:400,color:'#fff'},
];
const CW = 220, CH = 390; // canvas dimensions

// ─────────────────────────────────────────────
// STATE MANAGEMENT
// Two modes:
//   set(patch)   → merge + full re-render  (UI updates)
//   setQuiet(patch) → merge only, then call patchCanvas()  (drag/resize — no full re-render)
// ─────────────────────────────────────────────
function set(patch) {
  if (typeof patch === 'function') patch = patch(S);
  Object.assign(S, patch);
  renderApp();
}

function setQuiet(patch) {
  if (typeof patch === 'function') patch = patch(S);
  Object.assign(S, patch);
  patchCanvas(); // only update canvas element positions
}

let _uid_counter = 0;
function uid() { return ++_uid_counter; }

// ─────────────────────────────────────────────
// DRAG & RESIZE (window-level, no re-render during move)
// ─────────────────────────────────────────────
let _drag = null;
let _canvasRect = null;

window.addEventListener('mousedown',  onDown,  {passive:false});
window.addEventListener('touchstart', onDown,  {passive:false});
window.addEventListener('mousemove',  onMove,  {passive:false});
window.addEventListener('touchmove',  onMove,  {passive:false});
window.addEventListener('mouseup',    onUp);
window.addEventListener('touchend',   onUp);

function clientXY(e) {
  if (e.touches && e.touches[0]) return [e.touches[0].clientX, e.touches[0].clientY];
  return [e.clientX, e.clientY];
}

function onDown(e) {
  const handle = e.target.closest('.rh');
  const celDiv  = e.target.closest('.cel');
  if (!handle && !celDiv) return;
  e.preventDefault();
  _canvasRect = document.getElementById('phone-canvas')?.getBoundingClientRect();
  if (!_canvasRect) return;
  const [cx, cy] = clientXY(e);
  if (handle) {
    const id = +handle.dataset.elid;
    const el = S.canvasEls.find(e=>e.id===id); if (!el) return;
    _drag = {type:'resize', id, dir:handle.dataset.dir, sx:cx, sy:cy, ox:el.x, oy:el.y, ow:el.w, oh:el.h};
  } else {
    const id = +celDiv.dataset.elid;
    const el = S.canvasEls.find(e=>e.id===id); if (!el) return;
    set({selectedEl: id});
    _drag = {type:'drag', id, sx:cx, sy:cy, ox:el.x, oy:el.y};
  }
}

function onMove(e) {
  if (!_drag) return;
  if (e.cancelable) e.preventDefault();
  const [cx, cy] = clientXY(e);
  const dx = cx - _drag.sx, dy = cy - _drag.sy;
  setQuiet(s => ({
    canvasEls: s.canvasEls.map(el => {
      if (el.id !== _drag.id) return el;
      if (_drag.type === 'drag') {
        return {...el,
          x: Math.max(0, Math.min(CW - el.w, _drag.ox + dx)),
          y: Math.max(0, Math.min(CH - el.h, _drag.oy + dy))
        };
      }
      // resize
      const d = _drag.dir;
      let nx=_drag.ox, ny=_drag.oy, nw=_drag.ow, nh=_drag.oh;
      if (d.includes('e')) nw = Math.max(24, _drag.ow + dx);
      if (d.includes('s')) nh = Math.max(20, _drag.oh + dy);
      if (d.includes('w')) { nw = Math.max(24, _drag.ow - dx); nx = _drag.ox + _drag.ow - nw; }
      if (d.includes('n')) { nh = Math.max(20, _drag.oh - dy); ny = _drag.oy + _drag.oh - nh; }
      return {...el, x:nx, y:ny, w:nw, h:nh};
    })
  }));
}

function onUp() { _drag = null; }

// ─────────────────────────────────────────────
// CANVAS PATCH  — only repositions elements, no full re-render
// ─────────────────────────────────────────────
function patchCanvas() {
  S.canvasEls.filter(e=>e.visible).forEach(el => {
    const div = document.querySelector(`.cel[data-elid="${el.id}"]`);
    if (!div) return;
    div.style.left   = el.x + 'px';
    div.style.top    = el.y + 'px';
    div.style.width  = el.w + 'px';
    div.style.height = el.h + 'px';
    // update emoji font size during resize
    if (el.kind === 'emoji') {
      const sp = div.querySelector('span');
      if (sp) sp.style.fontSize = Math.max(8, el.h * 0.75) + 'px';
    }
    if (el.kind === 'caption') {
      const sp = div.querySelector('span');
      if (sp) sp.style.fontSize = Math.max(8, el.h * 0.5) + 'px';
    }
  });
}

// ─────────────────────────────────────────────
// CANVAS ELEMENT FACTORY
// ─────────────────────────────────────────────
function makeCelDOM(el) {
  const div = document.createElement('div');
  div.className = 'cel' + (S.selectedEl === el.id ? ' sel' : '');
  div.dataset.elid = el.id;
  div.style.cssText = `left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${el.h}px;opacity:${el.opacity??1};z-index:${S.selectedEl===el.id?20:10};display:flex;align-items:center;justify-content:center;`;

  if (el.kind === 'pip') {
    const img = document.createElement('img');
    img.src = el.url;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:6px;pointer-events:none;display:block;';
    div.appendChild(img);
  } else if (el.kind === 'emoji') {
    const sp = document.createElement('span');
    sp.textContent = el.label;
    sp.style.cssText = `font-size:${Math.max(8,el.h*0.75)}px;line-height:1;pointer-events:none;user-select:none;`;
    div.appendChild(sp);
  } else if (el.kind === 'shape') {
    const inner = document.createElement('div');
    const circ = el.label === 'Circle';
    inner.style.cssText = `width:100%;height:100%;background:${el.fill||'rgba(255,60,126,0.35)'};border:2px solid ${el.stroke||'#ff3c7e'};border-radius:${circ?'50%':'8px'};pointer-events:none;`;
    div.appendChild(inner);
  } else if (el.kind === 'caption') {
    const sp = document.createElement('span');
    sp.textContent = el.label;
    sp.style.cssText = `font-size:${Math.max(8,el.h*0.5)}px;font-weight:700;color:${el.color||'#ff3c7e'};text-shadow:1px 1px 6px rgba(0,0,0,0.95);pointer-events:none;user-select:none;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;`;
    div.appendChild(sp);
  }

  if (S.selectedEl === el.id) {
    ['se','sw','ne','nw'].forEach(dir => {
      const h = document.createElement('div');
      h.className = `rh ${dir}`;
      h.dataset.dir = dir;
      h.dataset.elid = el.id;
      div.appendChild(h);
    });
    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '×';
    del.dataset.elid = el.id;
    del.addEventListener('mousedown', e => { e.stopPropagation(); deleteEl(el.id); });
    del.addEventListener('touchstart', e => { e.stopPropagation(); deleteEl(el.id); }, {passive:false});
    div.appendChild(del);
  }
  return div;
}

// ─────────────────────────────────────────────
// MEDIA HELPERS
// ─────────────────────────────────────────────
function addCanvasEl(kind, props) {
  const id = uid();
  const el = {id, kind, visible:true, opacity:1, x:30, y:80, w:100, h:80, ...props};
  set(s => ({canvasEls:[...s.canvasEls, el], selectedEl:id}));
}

function updateEl(id, patch) {
  set(s => ({canvasEls: s.canvasEls.map(e => e.id===id ? {...e,...patch} : e)}));
}

function deleteEl(id) {
  set(s => ({canvasEls: s.canvasEls.filter(e=>e.id!==id), selectedEl: s.selectedEl===id ? null : s.selectedEl}));
}

function addClip(files, type) {
  Array.from(files).forEach(f => {
    const id = uid();
    const url = URL.createObjectURL(f);
    const clip = {id, name:f.name, url, type, trimStart:0, trimEnd:null, duration:null};
    set(s => ({clips:[...s.clips, clip]}));
    if (type === 'VID') {
      // probe duration without affecting preview
      const probe = document.createElement('video');
      probe.preload = 'metadata';
      probe.src = url;
      probe.onloadedmetadata = () => {
        set(s => ({clips: s.clips.map(c => c.id===id ? {...c, duration:probe.duration, trimEnd:probe.duration} : c)}));
        probe.remove();
      };
    }
  });
}

function handleAudioUpload(file) {
  const url = URL.createObjectURL(file);
  if (_audioEl) { _audioEl.pause(); _audioEl.src = ''; }
  _audioEl = new Audio(url);
  _audioEl.volume = S.volume;
  _audioEl.muted = S.muted;
  set({audioName: file.name, audioUrl: url});
}

function syncVolume() {
  const v = document.getElementById('preview-video');
  if (v) { v.volume = S.volume; v.muted = S.muted; }
  if (_audioEl) { _audioEl.volume = S.volume; _audioEl.muted = S.muted; }
}

function playAll() {
  const v = document.getElementById('preview-video');
  syncVolume();
  if (v) { v.currentTime = S.clips.find(c=>c.type==='VID')?.trimStart || 0; v.play(); }
  if (_audioEl) { _audioEl.currentTime = 0; _audioEl.play(); }
  set({playing:true});
}

function stopAll() {
  const v = document.getElementById('preview-video');
  if (v) { v.pause(); v.currentTime = S.clips.find(c=>c.type==='VID')?.trimStart || 0; }
  if (_audioEl) { _audioEl.pause(); _audioEl.currentTime = 0; }
  set({playing:false});
}

// Enforce trim bounds during playback
setInterval(() => {
  if (!S.playing) return;
  const v = document.getElementById('preview-video');
  const vid = S.clips.find(c=>c.type==='VID');
  if (v && vid && vid.trimEnd && v.currentTime >= vid.trimEnd) {
    v.currentTime = vid.trimStart || 0;
  }
}, 250);

// ─────────────────────────────────────────────
// AI CAPTIONS
// ─────────────────────────────────────────────
async function generateCaptions() {
  if (!S.apiKey) { set({showApiKey:true}); return; }
  set({generating:true, generatedCaption:''});
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
        messages:[{role:'user',content:`Generate 3 short punchy social media reel captions for a ${S.niche} reel about "${S.brief||'general content'}". Each under 2 lines with emojis. Numbered list.`}]})
    });
    const d = await res.json();
    set({generatedCaption: d.content?.find(b=>b.type==='text')?.text || 'No captions returned.'});
  } catch(err) { set({generatedCaption:'Error: '+err.message}); }
  set({generating:false});
}

function startExport() {
  set({exporting:true, exportDone:false, exportProgress:0});
  let p = 0;
  const iv = setInterval(() => {
    p += Math.random()*12+4;
    if (p>=100) { clearInterval(iv); set({exportProgress:100}); setTimeout(()=>set({exporting:false,exportDone:true}),400); }
    else set({exportProgress:Math.round(p)});
  },220);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderApp() {
  const app = document.getElementById('app');

  // ── Before wiping, persist video playback state ──
  const oldVid = document.getElementById('preview-video');
  const preservedTime = oldVid ? oldVid.currentTime : 0;

  app.innerHTML = '';
  const root = D('div','min-height:100vh;background:#0d0d18;');

  // Header
  const hdr = D('div','text-align:center;padding:36px 20px 24px;');
  hdr.innerHTML = `<h1 style="font-size:clamp(36px,7vw,60px);font-weight:900;letter-spacing:-.02em;line-height:1;"><span style="color:#ff3c7e">REEL </span><span style="color:#fff">MAKER</span></h1><p style="font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,0.35);margin-top:10px;text-transform:uppercase;">SEQUENCE · STYLE · OVERLAY · DOWNLOAD</p>`;
  root.appendChild(hdr);

  // API Key banner
  if (S.showApiKey) {
    const b = D('div','max-width:1200px;margin:0 auto 16px;padding:0 20px;');
    const bi = D('div','background:rgba(255,60,126,0.08);border:1px solid rgba(255,60,126,0.25);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;');
    bi.innerHTML = `<span style="font-size:13px;color:rgba(255,255,255,0.7);flex:1;">🔑 Anthropic API key for AI captions:</span>`;
    const ki = makeInput('password', S.apiKey, v=>set({apiKey:v}), 'sk-ant-...', 'flex:0 0 260px;');
    const kb = makeBtn('Save','padding:8px 16px;border-radius:7px;background:#ff3c7e;border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;',()=>set({showApiKey:false}));
    bi.appendChild(ki); bi.appendChild(kb); b.appendChild(bi); root.appendChild(b);
  }

  // Two-column layout
  const layout = D('div','display:flex;gap:16px;padding:0 20px 60px;max-width:1200px;margin:0 auto;align-items:flex-start;');
  const left = D('div','flex:0 0 540px;min-width:0;');
  const right = D('div','flex:1;min-width:0;position:sticky;top:20px;');

  // ────────────── LEFT ──────────────

  // § Media Sequence
  left.appendChild(makeSection('1','Media Sequence', () => {
    const w = D('div');
    const row = D('div','display:flex;gap:10px;margin-bottom:16px;');
    row.appendChild(makeUploadBox('🎬','Add Video(s)','MP4 · MOV · WebM','video/*',true, f=>addClip(f,'VID')));
    row.appendChild(makeUploadBox('🖼️','Add Image(s)','JPG · PNG · WebP','image/*',true, f=>addClip(f,'IMG')));
    w.appendChild(row);
    if (S.clips.length) {
      const bar = D('div','display:flex;justify-content:space-between;margin-bottom:8px;');
      bar.innerHTML=`<span style="font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,0.35);text-transform:uppercase;">Clips</span><span style="font-size:10px;color:rgba(255,255,255,0.25);">× remove</span>`;
      w.appendChild(bar);
      const thumbs = D('div','display:flex;flex-wrap:wrap;gap:12px;');
      S.clips.forEach(clip => {
        const card = D('div','position:relative;flex:0 0 auto;');
        const box = D('div','width:72px;height:72px;border-radius:8px;overflow:hidden;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);');
        if (clip.type==='IMG') { const img=document.createElement('img'); img.src=clip.url; img.style.cssText='width:100%;height:100%;object-fit:cover;'; box.appendChild(img); }
        else { const v=document.createElement('video'); v.src=clip.url; v.muted=true; v.style.cssText='width:100%;height:100%;object-fit:cover;'; box.appendChild(v); }
        card.appendChild(box);
        const badge=D('div','position:absolute;top:3px;left:3px;background:rgba(0,0,0,0.75);border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;');
        badge.style.color=clip.type==='VID'?'#60a5fa':'#a78bfa'; badge.textContent=clip.type; card.appendChild(badge);
        const xb=makeBtn('×','position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:#ef4444;border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;',
          ()=>set(s=>({clips:s.clips.filter(c=>c.id!==clip.id)})));
        card.appendChild(xb);
        const dur=D('div','text-align:center;font-size:10px;color:rgba(255,255,255,0.5);margin-top:3px;');
        dur.textContent=clip.duration?clip.duration.toFixed(1)+'s':(clip.type==='VID'?'loading…':'img');

  right.appendChild(layCard);

  // Preview card
  const prevCard=D('div'); prevCard.className='card';
  const ph=D('div','font-size:11px;font-weight:700;letter-spacing:.15em;color:rgba(255,255,255,0.45);text-transform:uppercase;margin-bottom:6px;');
  ph.textContent='Live Preview'; prevCard.appendChild(ph);
  const ps=D('div','font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:14px;');
  ps.textContent='Click element to select · drag to move · corner handles to resize'; prevCard.appendChild(ps);

  // Phone
  const phoneCtr=D('div','display:flex;justify-content:center;margin-bottom:14px;');
  const phone=D('div',`width:${CW}px;height:${CH}px;border-radius:28px;background:#111;border:3px solid #333;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.7);overflow:visible;`);
  // Inner clip area
  const clip=D('div',`position:absolute;inset:0;border-radius:25px;overflow:hidden;`);
  clip.id='phone-canvas';
  phone.appendChild(clip);

  // Notch on top of phone (outside clip so it's always visible)
  const notch=D('div','position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:16px;background:#111;border-radius:0 0 12px 12px;z-index:50;');
  phone.appendChild(notch);

  const vidClip=S.clips.find(c=>c.type==='VID');
  const imgClip=S.clips.find(c=>c.type==='IMG');

  if(vidClip){
    const v=document.createElement('video');
    v.id='preview-video'; v.src=vidClip.url; v.loop=true; v.playsInline=true;
    v.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;';
    v.onloadedmetadata=()=>{
      if(!vidClip.duration) set(s=>({clips:s.clips.map(c=>c.id===vidClip.id?{...c,duration:v.duration,trimEnd:v.duration||c.trimEnd}:c)}));
    };
    clip.appendChild(v);
    // restore time after re-render
    setTimeout(()=>{ const vv=document.getElementById('preview-video'); if(vv){ vv.volume=S.volume; vv.muted=S.muted; if(S.playing){vv.currentTime=preservedTime; vv.play();} }},0);
  } else if(imgClip){
    const img=document.createElement('img'); img.src=imgClip.url;
    img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;';
    clip.appendChild(img);
  } else {
    const empty=D('div','position:absolute;inset:0;background:linear-gradient(180deg,#1a1a2e,#0d0d18);display:flex;align-items:center;justify-content:center;z-index:1;');
    empty.innerHTML='<span style="font-size:32px;opacity:.2;">▶</span>'; clip.appendChild(empty);
  }

  // Overlay effects
  const op=S.overlayOpacity;
  if(S.overlays.vignette){ const v=D('div',`position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,${op.vignette}) 100%);pointer-events:none;z-index:5;`); clip.appendChild(v); }
  if(S.overlays.bars){ const b1=D('div',`position:absolute;top:0;left:0;right:0;height:34px;background:rgba(0,0,0,${op.bars});pointer-events:none;z-index:5;`); const b2=D('div',`position:absolute;bottom:0;left:0;right:0;height:34px;background:rgba(0,0,0,${op.bars});pointer-events:none;z-index:5;`); clip.appendChild(b1); clip.appendChild(b2); }
  if(S.overlays.grain){ const g=D('div',`position:absolute;inset:0;opacity:${op.grain};background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:5;`); clip.appendChild(g); }
  if(S.overlays.blur){ const bl=D('div',`position:absolute;inset:0;box-shadow:inset 0 0 ${Math.round(op.blur*80)}px rgba(0,0,0,0.9);pointer-events:none;z-index:5;`); clip.appendChild(bl); }

  // Static caption (if no caption canvas el exists)
  if(S.caption && !S.canvasEls.find(e=>e.kind==='caption')){
    const cd=D('div','position:absolute;bottom:0;left:0;right:0;padding:10px 10px 18px;z-index:8;pointer-events:none;');
    const ts=TEXT_STYLES.find(t=>t.id===S.textStyle);
    const ct=D('div',`font-size:${Math.min(S.fontSize*0.3,16)}px;font-weight:${ts?.fw||700};color:${ACCENT[S.accentColor]||'#ff3c7e'};text-shadow:1px 1px 6px rgba(0,0,0,0.95);margin-bottom:3px;`);
    if(ts?.shadow) ct.style.textShadow='2px 2px 0 #000,1px 1px 6px rgba(0,0,0,0.9)';
    ct.textContent=S.caption; cd.appendChild(ct);
    if(S.handle){ const h=D('div','font-size:9px;color:rgba(255,255,255,0.75);text-shadow:0 1px 4px rgba(0,0,0,0.9);'); h.textContent=S.handle; cd.appendChild(h); }
    clip.appendChild(cd);
  }

  // Canvas elements (pip, emoji, shape, caption) — appended to phone (not clip) so handles overflow
  S.canvasEls.filter(e=>e.visible).forEach(el=>{
    // append to phone div so resize handles can overflow the clip border
    const cel=makeCelDOM(el);
    // position relative to clip area which starts at inset:0 of phone
    cel.style.position='absolute';
    phone.appendChild(cel);
  });

  // click phone background to deselect
  phone.onclick=e=>{ if(e.target===phone||e.target===clip) set({selectedEl:null}); };

  // Big play button (on top, only when paused)
  if(vidClip && !S.playing){
    const po=D('div','position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:40;cursor:pointer;border-radius:25px;');
    const pc=D('div','width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.3);');
    pc.innerHTML='<span style="font-size:20px;margin-left:4px;">▶</span>';
    po.appendChild(pc); po.onclick=e=>{e.stopPropagation();playAll();};
    phone.appendChild(po);
  }

  phoneCtr.appendChild(phone); prevCard.appendChild(phoneCtr);

  // Play/Stop controls
  const ctrl=D('div','display:flex;gap:8px;justify-content:center;margin-bottom:12px;');
  const pb=makeBtn('▶ Play',`padding:7px 20px;border-radius:7px;font-size:12px;font-weight:600;background:${S.playing?'rgba(255,60,126,0.15)':'rgba(255,255,255,0.07)'};border:1px solid ${S.playing?'#ff3c7e':'rgba(255,255,255,0.12)'};color:${S.playing?'#ff3c7e':'rgba(255,255,255,0.8)'};cursor:${!vidClip?'not-allowed':'pointer'};opacity:${!vidClip?0.4:1};`,playAll);
  pb.disabled=!vidClip;
  const sb=makeBtn('■ Stop','padding:7px 20px;border-radius:7px;font-size:12px;font-weight:600;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);cursor:pointer;',stopAll);
  ctrl.appendChild(pb); ctrl.appendChild(sb); prevCard.appendChild(ctrl);

  // Volume
  const vb=D('div','background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 14px;');
  const vr=D('div','display:flex;align-items:center;gap:10px;');
  const mb=makeBtn(S.muted||S.volume===0?'🔇':S.volume<0.5?'🔉':'🔊','background:none;border:none;cursor:pointer;font-size:18px;padding:0;flex-shrink:0;',()=>{ set(s=>({muted:!s.muted})); syncVolume(); });
  vr.appendChild(mb);
  const vs=document.createElement('input'); vs.type='range'; vs.min='0'; vs.max='1'; vs.step='0.01'; vs.value=S.muted?0:S.volume;
  vs.style.cssText='flex:1;'; vs.oninput=e=>{ set({volume:+e.target.value,muted:+e.target.value===0}); syncVolume(); };
  vr.appendChild(vs);
  const vp=D('span','font-size:11px;color:rgba(255,255,255,0.4);min-width:34px;text-align:right;');
  vp.textContent=(S.muted?0:Math.round(S.volume*100))+'%'; vr.appendChild(vp);
  vb.appendChild(vr); prevCard.appendChild(vb);

  if(vidClip){ const vn=D('div','text-align:center;font-size:10px;color:rgba(255,255,255,0.25);margin-top:8px;'); vn.textContent=vidClip.name; prevCard.appendChild(vn); }
  if(S.audioName){ const an=D('div','text-align:center;font-size:10px;color:rgba(245,158,11,0.6);margin-top:4px;'); an.textContent='🎵 '+S.audioName; prevCard.appendChild(an); }

  right.appendChild(prevCard);
  layout.appendChild(right);
  root.appendChild(layout);
  app.appendChild(root);
}

// ─────────────────────────────────────────────
// TRIM UI
// ─────────────────────────────────────────────
function makeTrimUI(clip) {
  const dur = clip.duration || 30;
  const end = clip.trimEnd ?? dur;
  const wrap = D('div','margin-top:8px;padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;width:200px;');
  const lbl = D('div','font-size:10px;letter-spacing:.08em;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px;');
  lbl.textContent=`✂ ${clip.trimStart.toFixed(1)}s → ${end.toFixed(1)}s`;
  wrap.appendChild(lbl);

  // Start
  const sl=D('div','margin-bottom:6px;');
  const sLbl=D('div','font-size:9px;color:rgba(255,255,255,0.35);margin-bottom:3px;'); sLbl.textContent='Start'; sl.appendChild(sLbl);
  const sRange=document.createElement('input'); sRange.type='range'; sRange.min='0'; sRange.max=dur.toFixed(1); sRange.step='0.1'; sRange.value=clip.trimStart.toFixed(1); sRange.style.cssText='width:100%;';
  sRange.oninput=ev=>{
    const val=Math.min(+ev.target.value, end-0.5);
    set(s=>({clips:s.clips.map(c=>c.id===clip.id?{...c,trimStart:val}:c)}));
    const v=document.getElementById('preview-video'); if(v) v.currentTime=val;
  };
  sl.appendChild(sRange); wrap.appendChild(sl);

  // End
  const el=D('div');
  const eLbl=D('div','font-size:9px;color:rgba(255,255,255,0.35);margin-bottom:3px;'); eLbl.textContent='End'; el.appendChild(eLbl);
  const eRange=document.createElement('input'); eRange.type='range'; eRange.min='0'; eRange.max=dur.toFixed(1); eRange.step='0.1'; eRange.value=end.toFixed(1); eRange.style.cssText='width:100%;';
  eRange.oninput=ev=>{
    const val=Math.max(+ev.target.value, clip.trimStart+0.5);
    set(s=>({clips:s.clips.map(c=>c.id===clip.id?{...c,trimEnd:val}:c)}));
  };
  el.appendChild(eRange); wrap.appendChild(el);
  return wrap;
}

// ─────────────────────────────────────────────
// DOM HELPERS
// ─────────────────────────────────────────────
function D(tag,style) { const e=document.createElement(tag); if(style) e.style.cssText=style; return e; }
function makeBtn(text,style,onclick){ const b=document.createElement('button'); b.textContent=text; b.style.cssText=style; if(onclick) b.onclick=onclick; return b; }
function makeInput(type,value,onChange,placeholder,extra=''){
  const i=document.createElement('input'); i.type=type; i.value=value; i.placeholder=placeholder||'';
  i.className='text-input'; i.style.cssText+=extra; i.oninput=e=>onChange(e.target.value); return i;
}
function fieldLabel(text,mt=0){ const d=D('div',`font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px;margin-top:${mt}px;`); d.textContent=text; return d; }
function makeToggle(on,onclick){
  const d=document.createElement('button'); d.className='toggle'+(on?' on':'');
  const k=D('div'); k.className='toggle-knob'; d.appendChild(k); d.onclick=onclick; return d;
}
function makeSlider(value,min,max,onChange,displayVal,color,labels=null,step=1){
  const wrap=D('div');
  const row=D('div','display:flex;align-items:center;gap:10px;');
  if(labels){ const s=D('span','font-size:10px;color:rgba(255,255,255,0.35);flex-shrink:0;'); s.textContent=labels[0]; row.appendChild(s); }
  const sl=document.createElement('input'); sl.type='range'; sl.min=min; sl.max=max; sl.step=step; sl.value=value; sl.style.cssText='flex:1;';
  sl.oninput=e=>onChange(step<1?+e.target.value:Math.round(+e.target.value)); row.appendChild(sl);
  if(labels){ const e=D('span','font-size:10px;color:rgba(255,255,255,0.35);flex-shrink:0;'); e.textContent=labels[1]; row.appendChild(e); }
  const val=D('span','font-size:11px;font-weight:700;min-width:40px;text-align:right;flex-shrink:0;'); val.style.color=color; val.textContent=displayVal; row.appendChild(val);
  wrap.appendChild(row); return wrap;
}
function makeSection(num,title,contentFn){
  const d=D('div'); d.className='card';
  const hdr=D('div'); hdr.className='sec-hdr';
  const badge=D('div'); badge.className='sec-badge'; badge.textContent=num;
  const t=D('span'); t.className='sec-title'; t.textContent=title;
  hdr.appendChild(badge); hdr.appendChild(t); d.appendChild(hdr); d.appendChild(contentFn()); return d;
}
function makeUploadBox(icon,label,sub,accept,multiple,onFiles){
  const d=D('div'); d.className='upload-box';
  d.innerHTML=`<span class="ub-icon">${icon}</span><span class="ub-label">${label}</span><span class="ub-sub">${sub}</span>`;
  d.onclick=()=>{ const i=document.createElement('input'); i.type='file'; i.accept=accept; i.multiple=!!multiple; i.onchange=e=>{if(e.target.files.length) onFiles(e.target.files);}; i.click(); };
  return d;
}
function makeSegBtn(text,active,col,onclick){
  const b=document.createElement('button'); b.className='seg-btn'; b.textContent=text;
  if(active){ b.style.borderColor=col; b.style.background=col+'22'; b.style.color=col; }
  b.onclick=onclick; return b;
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
renderApp();
</script>
