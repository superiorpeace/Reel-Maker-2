<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reel Maker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d18;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
input,textarea,button,select{font-family:inherit}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:999px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#ff3c7e;cursor:pointer;border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,0.5)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0d0d18}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:99px}
.rh{position:absolute;width:12px;height:12px;background:#ff3c7e;border:2px solid #fff;border-radius:2px;z-index:100;touch-action:none}
.rh-se{bottom:-6px;right:-6px;cursor:se-resize}
.rh-sw{bottom:-6px;left:-6px;cursor:sw-resize}
.rh-ne{top:-6px;right:-6px;cursor:ne-resize}
.rh-nw{top:-6px;left:-6px;cursor:nw-resize}
.canvas-el{position:absolute;touch-action:none;cursor:move}
.canvas-el.selected{outline:2px solid #ff3c7e;outline-offset:1px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let state = {
  clips: [],
  canvasEls: [],
  selectedEl: null,
  caption: '',
  handle: '',
  brief: '',
  niche: 'Lifestyle',
  textStyle: 'bold',
  fontSize: 46,
  accentColor: 'Pink',
  overlays: { vignette: false, bars: false, grain: false, blur: false },
  overlayOpacity: { vignette: 0.7, bars: 1, grain: 0.5, blur: 0.5 },
  playing: false,
  volume: 1,
  muted: false,
  audioFile: null,
  audioUrl: null,
  emojiInput: '',
  emojiSize: 64,
  exportFormat: 'MP4',
  exportQuality: '1080p',
  exportRatio: '9:16',
  exportFps: '30fps',
  exporting: false,
  exportProgress: 0,
  exportDone: false,
  apiKey: '',
  showApiKey: false,
  generatedCaption: '',
  generating: false,
};

let videoEl = null;
let audioEl = null;

function setState(patch) {
  Object.assign(state, typeof patch === 'function' ? patch(state) : patch);
  render();
}

// ── CONSTANTS ──────────────────────────────────────────────────────────────
const ACCENT_MAP = {Pink:'#ff3c7e',Purple:'#a855f7',Cyan:'#06b6d4',Gold:'#f59e0b',Green:'#22c55e',White:'#ffffff'};
const NICHES = ['Lifestyle','Fitness','Food','Travel','Fashion','Beauty','Business','Tech'];
const EMOJIS = ['⬛','🔥','✨','💯','🙌','💪','🎉','☀️','👏','↩️','😎','🤩','🌸','🦋','🎵','🧚','🏆','👑','💎','🌈','▶️','🧿','🌊','🎯','🌴','🎮','💡'];
const TEXT_STYLES = [
  {id:'bold',label:'BOLD',fw:900,color:'#fff'},
  {id:'stroke',label:'STROKE',fw:700,color:'#ff3c7e'},
  {id:'pill',label:'PILL',fw:700,color:'#fff',pill:true},
  {id:'shadow',label:'SHADOW',fw:900,color:'#ff3c7e',shadow:true},
  {id:'grad',label:'GRAD',fw:900,grad:true},
  {id:'clean',label:'clean',fw:400,color:'#fff'},
];
const CANVAS_W = 220, CANVAS_H = 390;

// ── DRAG + RESIZE ──────────────────────────────────────────────────────────
let dragState = null;

function startDrag(e, id) {
  e.preventDefault();
  e.stopPropagation();
  const el = state.canvasEls.find(e => e.id === id);
  if (!el) return;
  setState({ selectedEl: id });
  const cx = e.clientX ?? e.touches?.[0]?.clientX;
  const cy = e.clientY ?? e.touches?.[0]?.clientY;
  dragState = { type: 'drag', id, sx: cx, sy: cy, ox: el.x, oy: el.y };
}

function startResize(e, id, dir) {
  e.preventDefault();
  e.stopPropagation();
  const el = state.canvasEls.find(e => e.id === id);
  if (!el) return;
  const cx = e.clientX ?? e.touches?.[0]?.clientX;
  const cy = e.clientY ?? e.touches?.[0]?.clientY;
  dragState = { type: 'resize', id, dir, sx: cx, sy: cy, ox: el.x, oy: el.y, ow: el.w, oh: el.h };
}

document.addEventListener('mousemove', onPointerMove);
document.addEventListener('touchmove', onPointerMove, { passive: false });
document.addEventListener('mouseup', onPointerUp);
document.addEventListener('touchend', onPointerUp);

function onPointerMove(e) {
  if (!dragState) return;
  if (e.cancelable) e.preventDefault();
  const cx = e.clientX ?? e.touches?.[0]?.clientX;
  const cy = e.clientY ?? e.touches?.[0]?.clientY;
  const dx = cx - dragState.sx;
  const dy = cy - dragState.sy;

  setState(s => ({
    canvasEls: s.canvasEls.map(el => {
      if (el.id !== dragState.id) return el;
      if (dragState.type === 'drag') {
        return { ...el,
          x: Math.max(0, Math.min(CANVAS_W - el.w, dragState.ox + dx)),
          y: Math.max(0, Math.min(CANVAS_H - el.h, dragState.oy + dy))
        };
      }
      if (dragState.type === 'resize') {
        const dir = dragState.dir;
        let nx=dragState.ox, ny=dragState.oy, nw=dragState.ow, nh=dragState.oh;
        if (dir.includes('e')) nw = Math.max(30, dragState.ow + dx);
        if (dir.includes('s')) nh = Math.max(20, dragState.oh + dy);
        if (dir.includes('w')) { nw = Math.max(30, dragState.ow - dx); nx = dragState.ox + dragState.ow - nw; }
        if (dir.includes('n')) { nh = Math.max(20, dragState.oh - dy); ny = dragState.oy + dragState.oh - nh; }
        return { ...el, x: nx, y: ny, w: nw, h: nh };
      }
      return el;
    })
  }));
}

function onPointerUp() { dragState = null; }

// ── HELPERS ────────────────────────────────────────────────────────────────
function uid() { return Date.now() + Math.random(); }

function addCanvasEl(kind, props) {
  const id = uid();
  const el = { id, kind, visible: true, opacity: 1, x: 30, y: 80, w: 100, h: 80, ...props };
  setState(s => ({ canvasEls: [...s.canvasEls, el], selectedEl: id }));
}

function updateEl(id, patch) {
  setState(s => ({ canvasEls: s.canvasEls.map(e => e.id === id ? { ...e, ...patch } : e) }));
}

function deleteEl(id) {
  setState(s => ({ canvasEls: s.canvasEls.filter(e => e.id !== id), selectedEl: s.selectedEl === id ? null : s.selectedEl }));
}

function addClip(files, type) {
  const newClips = Array.from(files).map(f => ({
    id: uid(), name: f.name, url: URL.createObjectURL(f), type,
    trimStart: 0, trimEnd: null, duration: null
  }));
  setState(s => ({ clips: [...s.clips, ...newClips] }));
  if (type === 'VID' && newClips.length > 0) {
    setTimeout(() => {
      const v = document.getElementById('preview-video');
      if (v) {
        v.onloadedmetadata = () => {
          setState(s => ({
            clips: s.clips.map(c => c.id === newClips[0].id ? { ...c, trimEnd: v.duration, duration: v.duration } : c)
          }));
        };
      }
    }, 300);
  }
}

// ── AUDIO ──────────────────────────────────────────────────────────────────
function handleAudioUpload(file) {
  const url = URL.createObjectURL(file);
  setState({ audioFile: file.name, audioUrl: url });
  if (audioEl) { audioEl.src = url; }
}

// ── VIDEO CONTROLS ─────────────────────────────────────────────────────────
function syncVolume() {
  const v = document.getElementById('preview-video');
  if (v) { v.volume = state.volume; v.muted = state.muted; }
  if (audioEl) { audioEl.volume = state.volume; audioEl.muted = state.muted; }
}

function playAll() {
  const v = document.getElementById('preview-video');
  syncVolume();
  if (v) v.play();
  if (audioEl && state.audioUrl) audioEl.play();
  setState({ playing: true });
}

function stopAll() {
  const v = document.getElementById('preview-video');
  if (v) { v.pause(); v.currentTime = state.clips.find(c=>c.type==='VID')?.trimStart || 0; }
  if (audioEl) { audioEl.pause(); audioEl.currentTime = 0; }
  setState({ playing: false });
}

// ── AI CAPTIONS ────────────────────────────────────────────────────────────
async function generateCaptions() {
  if (!state.apiKey) { setState({ showApiKey: true }); return; }
  setState({ generating: true, generatedCaption: '' });
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': state.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 800,
        messages: [{ role: 'user', content: `Generate 3 short punchy social media reel captions for a ${state.niche} reel about "${state.brief || 'general content'}". Each 1-2 lines with emojis. Numbered list.` }] })
    });
    const data = await res.json();
    setState({ generatedCaption: data.content?.find(b => b.type === 'text')?.text || 'No captions returned.' });
  } catch(err) { setState({ generatedCaption: 'Error: ' + err.message }); }
  setState({ generating: false });
}

// ── EXPORT ─────────────────────────────────────────────────────────────────
function startExport() {
  setState({ exporting: true, exportDone: false, exportProgress: 0 });
  let p = 0;
  const iv = setInterval(() => {
    p += Math.random() * 12 + 4;
    if (p >= 100) { clearInterval(iv); setState({ exportProgress: 100 }); setTimeout(() => setState({ exporting: false, exportDone: true }), 400); }
    else setState({ exportProgress: Math.round(p) });
  }, 220);
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(buildUI());
  // re-attach video ref
  const v = document.getElementById('preview-video');
  if (v) { v.volume = state.volume; v.muted = state.muted; }
  // audio
  if (!audioEl && state.audioUrl) {
    audioEl = new Audio(state.audioUrl);
    audioEl.volume = state.volume;
    audioEl.muted = state.muted;
  }
}

// ── CANVAS ELEMENTS render (DOM, not innerHTML) ────────────────────────────
function makeCanvasEl(el) {
  const div = document.createElement('div');
  div.className = 'canvas-el' + (state.selectedEl === el.id ? ' selected' : '');
  div.style.cssText = `left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${el.h}px;opacity:${el.opacity};z-index:${state.selectedEl===el.id?15:10};display:flex;align-items:center;justify-content:center;`;

  // content
  if (el.kind === 'pip') {
    const img = document.createElement('img');
    img.src = el.url;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:6px;pointer-events:none;';
    div.appendChild(img);
  } else if (el.kind === 'emoji') {
    const span = document.createElement('span');
    span.textContent = el.label;
    span.style.cssText = `font-size:${el.h*0.7}px;line-height:1;user-select:none;pointer-events:none;`;
    div.appendChild(span);
  } else if (el.kind === 'shape') {
    const inner = document.createElement('div');
    const isCirc = el.label === 'Circle';
    inner.style.cssText = `width:100%;height:100%;background:${el.fill||'rgba(255,60,126,0.4)'};border:2px solid ${el.stroke||'#ff3c7e'};border-radius:${isCirc?'50%':'8px'};pointer-events:none;`;
    div.appendChild(inner);
  } else if (el.kind === 'caption') {
    const span = document.createElement('span');
    span.textContent = el.label;
    span.style.cssText = `font-size:${Math.max(10,el.h*0.45)}px;font-weight:700;color:${el.color||'#ff3c7e'};text-shadow:1px 1px 4px rgba(0,0,0,0.9);user-select:none;pointer-events:none;white-space:nowrap;`;
    div.appendChild(span);
  }

  // drag
  div.addEventListener('mousedown', e => startDrag(e, el.id));
  div.addEventListener('touchstart', e => startDrag(e, el.id), { passive: false });

  // resize handles
  if (state.selectedEl === el.id) {
    [['se','rh-se'],['sw','rh-sw'],['ne','rh-ne'],['nw','rh-nw']].forEach(([dir,cls]) => {
      const h = document.createElement('div');
      h.className = `rh ${cls}`;
      h.addEventListener('mousedown', e => startResize(e, el.id, dir));
      h.addEventListener('touchstart', e => startResize(e, el.id, dir), { passive: false });
      div.appendChild(h);
    });
    // delete btn
    const del = document.createElement('button');
    del.textContent = '×';
    del.style.cssText = 'position:absolute;top:-10px;right:-10px;width:20px;height:20px;border-radius:50%;background:#ef4444;border:2px solid #fff;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:101;';
    del.addEventListener('mousedown', e => { e.stopPropagation(); deleteEl(el.id); });
    div.appendChild(del);
  }

  return div;
}

// ── TRIM SLIDER ────────────────────────────────────────────────────────────
function makeTrimSlider(clip) {
  const dur = clip.duration || 60;
  const trimEnd = clip.trimEnd ?? dur;
  const div = document.createElement('div');
  div.style.cssText = 'margin-top:10px;padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;';
  div.innerHTML = `
    <div style="font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px;">✂ Trim: ${clip.trimStart.toFixed(1)}s → ${trimEnd.toFixed(1)}s</div>
    <div style="margin-bottom:6px;">
      <label style="font-size:10px;color:rgba(255,255,255,0.4);">Start</label>
      <input type="range" min="0" max="${dur}" step="0.1" value="${clip.trimStart}" style="width:100%;background:linear-gradient(to right,#ff3c7e ${clip.trimStart/dur*100}%,rgba(255,255,255,0.15) 0)" id="trim-start-${clip.id}"/>
    </div>
    <div>
      <label style="font-size:10px;color:rgba(255,255,255,0.4);">End</label>
      <input type="range" min="0" max="${dur}" step="0.1" value="${trimEnd}" style="width:100%;background:linear-gradient(to right,#a855f7 ${trimEnd/dur*100}%,rgba(255,255,255,0.15) 0)" id="trim-end-${clip.id}"/>
    </div>`;
  setTimeout(() => {
    const s = document.getElementById(`trim-start-${clip.id}`);
    const e2 = document.getElementById(`trim-end-${clip.id}`);
    if (s) s.addEventListener('input', ev => {
      const val = Math.min(+ev.target.value, (clip.trimEnd ?? dur) - 0.5);
      setState(st => ({ clips: st.clips.map(c => c.id === clip.id ? { ...c, trimStart: val } : c) }));
      const v = document.getElementById('preview-video');
      if (v) v.currentTime = val;
    });
    if (e2) e2.addEventListener('input', ev => {
      const val = Math.max(+ev.target.value, clip.trimStart + 0.5);
      setState(st => ({ clips: st.clips.map(c => c.id === clip.id ? { ...c, trimEnd: val } : c) }));
    });
  }, 0);
  return div;
}

// ── BUILD UI ───────────────────────────────────────────────────────────────
function buildUI() {
  const root = document.createElement('div');
  root.style.cssText = 'min-height:100vh;background:#0d0d18;';

  // Header
  const hdr = document.createElement('div');
  hdr.style.cssText = 'text-align:center;padding:36px 20px 24px;';
  hdr.innerHTML = `<h1 style="font-size:clamp(36px,7vw,64px);font-weight:900;letter-spacing:-.02em;line-height:1;"><span style="color:#ff3c7e">REEL </span><span style="color:#fff">MAKER</span></h1><p style="font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,0.35);margin-top:10px;text-transform:uppercase;">SEQUENCE · STYLE · OVERLAY · DOWNLOAD</p>`;
  root.appendChild(hdr);

  // API key banner
  if (state.showApiKey) {
    const banner = el('div','','max-width:1200px;margin:0 auto 16px;padding:0 20px;');
    const inner = el('div','','background:rgba(255,60,126,0.08);border:1px solid rgba(255,60,126,0.25);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;');
    inner.innerHTML = `<span style="font-size:13px;color:rgba(255,255,255,0.7);flex:1;">🔑 Anthropic API key for AI captions:</span>`;
    const inp = input('password', state.apiKey, v => setState({ apiKey: v }), 'sk-ant-...', 'flex:0 0 280px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,60,126,0.3);border-radius:7px;color:#fff;font-size:13px;padding:8px 12px;outline:none;');
    const btn = button('Save','padding:8px 16px;border-radius:7px;background:#ff3c7e;border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;', () => setState({ showApiKey: false }));
    inner.appendChild(inp); inner.appendChild(btn);
    banner.appendChild(inner); root.appendChild(banner);
  }

  // Main layout
  const main = el('div','','display:flex;gap:16px;padding:0 20px 60px;max-width:1200px;margin:0 auto;align-items:flex-start;');

  // ── LEFT ──
  const left = el('div','','flex:0 0 540px;min-width:0;');

  // 1. Media
  left.appendChild(makeSection('1','Media Sequence', () => {
    const wrap = document.createElement('div');
    const row = el('div','','display:flex;gap:10px;margin-bottom:16px;');
    row.appendChild(makeUploadBox('🎬','Add Video(s)','MP4 · MOV · WebM','video/*',true,files => addClip(files,'VID')));
    row.appendChild(makeUploadBox('🖼️','Add Image(s)','JPG · PNG · WebP','image/*',true,files => addClip(files,'IMG')));
    wrap.appendChild(row);

    if (state.clips.length > 0) {
      const bar = el('div','','display:flex;justify-content:space-between;margin-bottom:8px;');
      bar.innerHTML = `<span style="font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,0.35);text-transform:uppercase;">Playback Order</span><span style="font-size:10px;color:rgba(255,255,255,0.25);">click × to remove</span>`;
      wrap.appendChild(bar);
      const thumbs = el('div','','display:flex;gap:8px;flex-wrap:wrap;');
      state.clips.forEach(clip => {
        const card2 = el('div','','position:relative;');
        const box = el('div','','width:72px;height:72px;border-radius:8px;overflow:hidden;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);');
        if (clip.type === 'IMG') {
          const img = document.createElement('img');
          img.src = clip.url; img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
          box.appendChild(img);
        } else {
          const v = document.createElement('video');
          v.src = clip.url; v.muted = true; v.style.cssText = 'width:100%;height:100%;object-fit:cover;';
          box.appendChild(v);
        }
        card2.appendChild(box);
        const badge = el('div','','position:absolute;top:3px;left:3px;background:rgba(0,0,0,0.7);border-radius:3px;padding:1px 4px;font-size:9px;font-weight:700;');
        badge.style.color = clip.type==='VID'?'#60a5fa':'#a78bfa';
        badge.textContent = clip.type;
        card2.appendChild(badge);
        const xbtn = el('button','','position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:#ef4444;border:none;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;');
        xbtn.textContent='×'; xbtn.onclick = () => setState(s => ({ clips: s.clips.filter(c => c.id!==clip.id) }));
        card2.appendChild(xbtn);
        const dur = el('div','','text-align:center;font-size:10px;color:rgba(255,255,255,0.5);margin-top:3px;');
        dur.textContent = clip.duration ? clip.duration.toFixed(1)+'s' : (clip.type==='VID'?'...':'5.0s');
        card2.appendChild(dur);
        thumbs.appendChild(card2);
        // trim for videos
        if (clip.type === 'VID') card2.appendChild(makeTrimSlider(clip));
      });
      wrap.appendChild(thumbs);
      const total = el('div','','margin-top:10px;font-size:11px;color:rgba(255,255,255,0.35);');
      total.textContent = `${state.clips.length} clip${state.clips.length!==1?'s':''} total`;
      wrap.appendChild(total);
    }
    return wrap;
  }));

  // PiP
  left.appendChild(makeSection('↗','Picture-in-Picture', () => {
    const wrap = document.createElement('div');
    wrap.appendChild(makeUploadBox('🖼️+','Add overlay image','Drops into preview — drag & resize freely','image/*',false,files => {
      const f = files[0]; if (!f) return;
      const url = URL.createObjectURL(f);
      addCanvasEl('pip', { label: f.name, url, x: 20, y: 20, w: 90, h: 90 });
    }));
    const count = state.canvasEls.filter(e=>e.kind==='pip').length;
    if (count > 0) {
      const note = el('div','','margin-top:8px;font-size:11px;color:rgba(255,255,255,0.4);');
      note.textContent = `${count} overlay image${count>1?'s':''} · click in preview to select & resize`;
      wrap.appendChild(note);
    }
    return wrap;
  }));

  // 2. Caption Brief
  left.appendChild(makeSection('2','Caption Brief', () => {
    const wrap = document.createElement('div');
    wrap.appendChild(label('What\'s your reel about?'));
    wrap.appendChild(textarea(state.brief, v => setState({ brief: v }), 'e.g. food, fitness tips...'));
    wrap.appendChild(label('Niche', 14));
    const niches = el('div','','display:flex;flex-wrap:wrap;gap:6px;');
    NICHES.forEach(n => {
      const b = pillButton(n, state.niche===n, '#ff3c7e', () => setState({ niche: n }));
      niches.appendChild(b);
    });
    wrap.appendChild(niches);
    wrap.appendChild(label('Caption Text', 14));
    const crow = el('div','','display:flex;gap:8px;');
    crow.appendChild(input('text', state.caption, v => setState({ caption: v }), 'Your caption here...', 'flex:1;'));
    const addBtn = button('+','padding:0 14px;border-radius:8px;background:rgba(255,60,126,0.15);border:1px solid #ff3c7e;color:#ff3c7e;font-size:18px;cursor:pointer;', () => {
      if (state.caption) addCanvasEl('caption', { label: state.caption, color: ACCENT_MAP[state.accentColor]||'#ff3c7e', x:10, y:300, w:200, h:36 });
    });
    addBtn.title = 'Add caption to preview as draggable element';
    crow.appendChild(addBtn);
    wrap.appendChild(crow);
    wrap.appendChild(label('Handle', 12));

  phone.onclick = e => { if (e.target === phone) setState({ selectedEl: null }); };

  // notch
  const notch = el('div','',`position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:16px;background:#111;border-radius:0 0 12px 12px;z-index:50;`);
  phone.appendChild(notch);

  const vidClip = state.clips.find(c=>c.type==='VID');
  const imgClip = state.clips.find(c=>c.type==='IMG');

  if (vidClip) {
    const v = document.createElement('video');
    v.id = 'preview-video';
    v.src = vidClip.url;
    v.loop = true; v.playsInline = true;
    if (state.playing) v.play();
    v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;';
    v.onloadedmetadata = () => {
      if (vidClip.trimEnd === null) setState(s => ({ clips: s.clips.map(c => c.id===vidClip.id?{...c,trimEnd:v.duration,duration:v.duration}:c) }));
    };
    phone.appendChild(v);
  } else if (imgClip) {
    const img = document.createElement('img');
    img.src = imgClip.url;
    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;';
    phone.appendChild(img);
  } else {
    const empty = el('div','','position:absolute;inset:0;background:linear-gradient(180deg,#1a1a2e,#0d0d18);display:flex;align-items:center;justify-content:center;z-index:1;');
    empty.innerHTML = '<span style="font-size:32px;opacity:.2;">▶</span>';
    phone.appendChild(empty);
  }

  // overlay effects
  if (state.overlays.vignette) {
    const vEl = el('div','',`position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,${state.overlayOpacity.vignette}) 100%);pointer-events:none;z-index:5;`);
    phone.appendChild(vEl);
  }
  if (state.overlays.bars) {
    const b1 = el('div','',`position:absolute;top:0;left:0;right:0;height:34px;background:rgba(0,0,0,${state.overlayOpacity.bars});pointer-events:none;z-index:5;`);
    const b2 = el('div','',`position:absolute;bottom:0;left:0;right:0;height:34px;background:rgba(0,0,0,${state.overlayOpacity.bars});pointer-events:none;z-index:5;`);
    phone.appendChild(b1); phone.appendChild(b2);
  }
  if (state.overlays.grain) {
    const g = el('div','',`position:absolute;inset:0;opacity:${state.overlayOpacity.grain};background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:5;`);
    phone.appendChild(g);
  }
  if (state.overlays.blur) {
    const bl = el('div','',`position:absolute;inset:0;box-shadow:inset 0 0 ${Math.round(state.overlayOpacity.blur*60)}px rgba(0,0,0,0.8);pointer-events:none;z-index:5;`);
    phone.appendChild(bl);
  }

  // canvas elements
  state.canvasEls.filter(e=>e.visible).forEach(cel => {
    phone.appendChild(makeCanvasEl(cel));
  });

  // static caption if no caption canvas el
  if (state.caption && !state.canvasEls.find(e=>e.kind==='caption')) {
    const capDiv = el('div','','position:absolute;bottom:0;left:0;right:0;padding:10px 10px 18px;z-index:8;');
    const ts = TEXT_STYLES.find(t=>t.id===state.textStyle);
    const capText = el('div','',`font-size:${Math.min(state.fontSize*0.28,15)}px;font-weight:${ts?.fw||700};color:${ACCENT_MAP[state.accentColor]||'#ff3c7e'};text-shadow:1px 1px 4px rgba(0,0,0,0.9);margin-bottom:3px;`);
    if (ts?.shadow) capText.style.textShadow = '2px 2px 0 #000,1px 1px 4px rgba(0,0,0,0.9)';
    capText.textContent = state.caption;
    capDiv.appendChild(capText);
    if (state.handle) {
      const h = el('div','','font-size:9px;color:rgba(255,255,255,0.7);text-shadow:0 1px 3px rgba(0,0,0,0.9);');
      h.textContent = state.handle;
      capDiv.appendChild(h);
    }
    phone.appendChild(capDiv);
  }

  // big play btn
  if (vidClip && !state.playing) {
    const playOvr = el('div','','position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;cursor:pointer;');
    const playCirc = el('div','','width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);border:2px solid rgba(255,255,255,0.3);');
    playCirc.innerHTML = '<span style="font-size:20px;margin-left:4px;">▶</span>';
    playOvr.appendChild(playCirc);
    playOvr.onclick = e => { e.stopPropagation(); playAll(); };
    phone.appendChild(playOvr);
  }

  phoneCtr.appendChild(phone);
  prevCard.appendChild(phoneCtr);

  // Playback controls
  const ctrlRow = el('div','','display:flex;gap:8px;justify-content:center;margin-bottom:12px;');
  const playBtn = button('▶ Play',`padding:7px 20px;border-radius:7px;font-size:12px;font-weight:600;background:${state.playing?'rgba(255,60,126,0.15)':'rgba(255,255,255,0.07)'};border:1px solid ${state.playing?'#ff3c7e':'rgba(255,255,255,0.12)'};color:${state.playing?'#ff3c7e':'rgba(255,255,255,0.8)'};cursor:${!vidClip?'not-allowed':'pointer'};opacity:${!vidClip?0.4:1};`, playAll);
  const stopBtn = button('■ Stop','padding:7px 20px;border-radius:7px;font-size:12px;font-weight:600;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);cursor:pointer;', stopAll);
  playBtn.disabled = !vidClip;
  ctrlRow.appendChild(playBtn); ctrlRow.appendChild(stopBtn);
  prevCard.appendChild(ctrlRow);

  // Volume
  const volBox = el('div','','background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 14px;');
  const volRow = el('div','','display:flex;align-items:center;gap:10px;');
  const muteBtn = el('button','','background:none;border:none;cursor:pointer;font-size:18px;padding:0;flex-shrink:0;');
  muteBtn.textContent = state.muted||state.volume===0 ? '🔇' : state.volume<0.5 ? '🔉' : '🔊';
  muteBtn.onclick = () => { setState(s => ({ muted: !s.muted })); syncVolume(); };
  volRow.appendChild(muteBtn);
  const volSlider = document.createElement('input');
  volSlider.type='range'; volSlider.min='0'; volSlider.max='1'; volSlider.step='0.01';
  volSlider.value = state.muted ? 0 : state.volume;
  volSlider.style.cssText = 'flex:1;';
  volSlider.oninput = e => { setState({ volume: +e.target.value, muted: +e.target.value===0 }); syncVolume(); };
  volRow.appendChild(volSlider);
  const volPct = el('span','','font-size:11px;color:rgba(255,255,255,0.4);min-width:34px;text-align:right;');
  volPct.textContent = (state.muted ? 0 : Math.round(state.volume*100))+'%';
  volRow.appendChild(volPct);
  volBox.appendChild(volRow);
  prevCard.appendChild(volBox);

  if (vidClip) {
    const vname = el('div','','text-align:center;font-size:10px;color:rgba(255,255,255,0.25);margin-top:8px;');
    vname.textContent = vidClip.name;
    prevCard.appendChild(vname);
  }

  right.appendChild(prevCard);
  main.appendChild(right);
  root.appendChild(main);
  return root;
}

// ── DOM HELPERS ────────────────────────────────────────────────────────────
function el(tag, id, style) {
  const e = document.createElement(tag);
  if (id) e.id = id;
  if (style) e.style.cssText = style;
  return e;
}
function button(text, style, onclick) {
  const b = document.createElement('button');
  b.textContent = text; b.style.cssText = style;
  if (onclick) b.onclick = onclick;
  return b;
}
function input(type, value, onChange, placeholder, extraStyle='') {
  const i = document.createElement('input');
  i.type=type; i.value=value; i.placeholder=placeholder||'';
  i.style.cssText = `background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:14px;padding:10px 12px;outline:none;width:100%;${extraStyle}`;
  i.oninput = e => onChange(e.target.value);
  return i;
}
function textarea(value, onChange, placeholder) {
  const t = document.createElement('textarea');
  t.value=value; t.placeholder=placeholder||'';
  t.style.cssText = 'width:100%;min-height:60px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:14px;padding:10px 12px;outline:none;resize:vertical;';
  t.oninput = e => onChange(e.target.value);
  return t;
}
function label(text, mt=0) {
  const d = document.createElement('div');
  d.style.cssText = `font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px;margin-top:${mt}px;`;
  d.textContent = text;
  return d;
}
function pillButton(text, active, col, onclick) {
  const b = document.createElement('button');
  b.textContent=text;
  b.style.cssText = `padding:5px 14px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid ${active?col:'rgba(255,255,255,0.12)'};background:${active?col+'22':'transparent'};color:${active?col:'rgba(255,255,255,0.6)'};transition:all .15s;`;
  b.onclick=onclick;
  return b;
}
function segButton(text, active, col, onclick) {
  const b = document.createElement('button');
  b.textContent=text;
  b.style.cssText = `flex:1;padding:9px 0;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid ${active?col:'rgba(255,255,255,0.1)'};background:${active?col+'22':'rgba(255,255,255,0.03)'};color:${active?col:'rgba(255,255,255,0.55)'};transition:all .15s;`;
  b.onclick=onclick;
  return b;
}
function makeToggle(on, onclick) {
  const d = document.createElement('div');
  d.style.cssText = `width:42px;height:24px;border-radius:999px;cursor:pointer;background:${on?'linear-gradient(90deg,#ff3c7e,#a855f7)':'rgba(255,255,255,0.1)'};position:relative;transition:background .2s;flex-shrink:0;`;
  const knob = document.createElement('div');
  knob.style.cssText = `position:absolute;top:3px;left:${on?21:3}px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,0.4);`;
  d.appendChild(knob); d.onclick=onclick;
  return d;
}
function makeSlider(value, min, max, onChange, displayVal, color, labels=null, step=1) {
  const wrap = document.createElement('div');
  const row = el('div','','display:flex;align-items:center;gap:10px;');
  if (labels) { const s=el('span','','font-size:10px;color:rgba(255,255,255,0.35);'); s.textContent=labels[0]; row.appendChild(s); }
  const slider = document.createElement('input');
  slider.type='range'; slider.min=min; slider.max=max; slider.step=step; slider.value=value;
  slider.style.cssText = `flex:1;background:linear-gradient(to right,${color} ${(value-min)/(max-min)*100}%,rgba(255,255,255,0.15) 0);`;
  slider.oninput = e => onChange(step<1 ? +e.target.value : +e.target.value|0);
  row.appendChild(slider);
  if (labels) { const e2=el('span','','font-size:10px;color:rgba(255,255,255,0.35);'); e2.textContent=labels[1]; row.appendChild(e2); }
  const val = el('span','','font-size:11px;font-weight:700;min-width:40px;text-align:right;'); val.style.color=color;
  val.textContent=displayVal;
  row.appendChild(val);
  wrap.appendChild(row);
  return wrap;
}
function makeSection(num, title, contentFn) {
  const d = el('div','',cardStyle());
  const hdr = el('div','','display:flex;align-items:center;gap:10px;margin-bottom:16px;');
  const badge = el('div','','width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#ff3c7e,#a855f7);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;');
  badge.textContent=num;
  const t = el('span','','font-size:11px;font-weight:700;letter-spacing:.15em;color:rgba(255,255,255,0.55);text-transform:uppercase;');
  t.textContent=title;
  hdr.appendChild(badge); hdr.appendChild(t);
  d.appendChild(hdr);
  d.appendChild(contentFn());
  return d;
}
function makeUploadBox(icon, label2, sub, accept, multiple, onFiles) {
  const d = el('div','','flex:1;border:1.5px dashed rgba(255,255,255,0.15);border-radius:10px;padding:24px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .2s;');
  d.innerHTML = `<span style="font-size:26px;">${icon}</span><span style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.8);">${label2}</span><span style="font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:.08em;">${sub}</span>`;
  d.onmouseenter = () => { d.style.borderColor='#ff3c7e'; d.style.background='rgba(255,60,126,0.05)'; };
  d.onmouseleave = () => { d.style.borderColor='rgba(255,255,255,0.15)'; d.style.background=''; };
  d.onclick = () => {
    const inp = document.createElement('input');
    inp.type='file'; inp.accept=accept; inp.multiple=!!multiple;
    inp.onchange = e => { if (e.target.files.length) onFiles(e.target.files); };
    inp.click();
  };
  return d;
}
function cardStyle() { return 'background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px 22px;margin-bottom:14px;'; }

// ── INITIAL RENDER ─────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
